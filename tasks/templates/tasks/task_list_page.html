{% extends 'base.html' %}

{% block title %}Tarefas - Gamified Tasks{% endblock %}

{% block content %}
<div class="bg-slate-900/50 border border-slate-800/80 rounded-2xl p-8 shadow-2xl backdrop-blur-md">
    <div class="flex items-center justify-between mb-8 pb-6 border-b border-slate-800/60">
        <div>
            <span class="text-xs font-semibold text-indigo-400 uppercase tracking-widest">Suas Tarefas</span>
            <h2 class="text-2xl font-bold text-slate-100 mt-1">Lista de Objetivos</h2>
        </div>
        <a href="{% url 'dashboard' %}" class="bg-slate-950 hover:bg-slate-900 border border-slate-800 hover:border-indigo-900/50 text-slate-400 hover:text-indigo-400 rounded-xl px-4 py-2.5 text-xs font-semibold tracking-wider uppercase transition-all">
            Voltar
        </a>
    </div>

    <!-- App de Tarefas (tasks) Root -->
    <div id="task-app-root">
        {% include 'tasks/partials/task_list.html' %}
    </div>
</div>
{% endblock %}
