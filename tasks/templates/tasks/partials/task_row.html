<div class="task-row-container p-4 rounded-xl border border-slate-900 bg-slate-950/40 hover:bg-slate-900/40 transition-all flex items-start gap-3 {% if task.is_completed %}opacity-60 border-slate-950{% endif %}">
    
    <!-- Checkbox de Conclusão -->
    <div class="flex items-center h-5">
        <input type="checkbox" 
               hx-post="{% url 'tasks:toggle' task.id %}?status={{ status|default:'pending' }}&q={{ q|default:'' }}&page={{ page_obj.number|default:1 }}" 
               hx-target="#task-app-root" 
               hx-swap="innerHTML"
               hx-trigger="click delay:1s"
               hx-on:click="this.closest('.task-row-container').classList.add('task-fading')"
               class="w-4 h-4 rounded border-slate-800 text-indigo-500 bg-slate-900 focus:ring-indigo-500/30 focus:ring-offset-0 focus:ring-1 cursor-pointer transition-all"
               {% if task.is_completed %}checked{% endif %}>
    </div>

    <!-- Conteúdo da Tarefa -->
    <div class="flex-1 min-w-0">
        <div class="flex items-center gap-2">
            <h4 class="text-xs font-bold text-slate-200 truncate {% if task.is_completed %}line-through text-slate-500 font-medium{% endif %}">
                {{ task.title }}
            </h4>
            <!-- Badge de XP -->
            <span class="inline-flex items-center px-1.5 py-0.5 rounded text-[8px] font-extrabold uppercase tracking-wide bg-amber-500/10 text-amber-400 border border-amber-500/20 shrink-0">
                +{{ task.xp_reward }} XP
            </span>
        </div>
        {% if task.description %}
            <p class="text-[10px] text-slate-500 mt-1 break-words leading-relaxed {% if task.is_completed %}line-through opacity-50{% endif %}">
                {{ task.description }}
            </p>
        {% endif %}
    </div>

    <!-- Ações (Editar / Excluir) -->
    <div class="flex items-center gap-1.5 self-center shrink-0">
        <!-- Botão Editar -->
        <button hx-get="{% url 'tasks:edit' task.id %}" 
                hx-target="closest .task-row-container" 
                hx-swap="outerHTML"
                title="Editar objetivo"
                class="p-1.5 text-slate-500 hover:text-indigo-400 hover:bg-indigo-500/10 rounded-lg transition-all cursor-pointer">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-3.5 h-3.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L6.832 19.82a4.5 4.5 0 0 1-1.897 1.13l-2.685.8.8-2.685a4.5 4.5 0 0 1 1.13-1.897L16.863 4.487Zm0 0L19.5 7.125" />
            </svg>
        </button>

        <!-- Botão Excluir -->
        <button hx-post="{% url 'tasks:delete' task.id %}?status={{ status|default:'pending' }}&q={{ q|default:'' }}&page={{ page_obj.number|default:1 }}"
                hx-confirm="Tem certeza de que deseja excluir esta tarefa?"
                hx-target="#task-app-root"
                hx-swap="innerHTML"
                title="Excluir objetivo"
                class="p-1.5 text-slate-500 hover:text-red-400 hover:bg-red-500/10 rounded-lg transition-all cursor-pointer">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-3.5 h-3.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" />
            </svg>
        </button>
    </div>
</div>
